<script>
    // 1. CONFIGURACIÓN INICIAL
    mapboxgl.accessToken = 'pk.eyJ1IjoiamFwYXljYXNoZHJvIiwiYSI6ImNtb2MxOTdhMTA2YjUycHB5eDZ2aTk2ZmgifQ.lbSCt1e6B1pV83Duovn8aQ';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [-102.55, 23.63], // Centro de México
        zoom: 5
    });

    let allData = [];
    let htmlMarkers = [];

    // 2. CARGA AUTOMÁTICA AL ABRIR LA PÁGINA
    window.onload = () => {
        const urlAuto = 'datos.csv'; // Asegúrate de que el archivo se llame así en GitHub

        Papa.parse(urlAuto, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Datos cargados automáticamente:", results.data);
                allData = results.data;
                processData(allData);
            },
            error: function(err) {
                console.warn("No se encontró el archivo automático datos.csv. Usa el botón de carga manual.");
            }
        });
    };

    // 3. CARGA MANUAL (Por si necesitas subir un archivo nuevo sin actualizar GitHub)
    document.getElementById('csv-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                allData = results.data;
                processData(allData);
            }
        });
    });

    // 4. LÓGICA DE PROCESAMIENTO (Marcadores y Filtros)
    function processData(data) {
        updateMapData(data);
        populateFilters(data);
    }

    function updateMapData(data) {
        htmlMarkers.forEach(m => m.remove());
        htmlMarkers = [];

        // Filtramos solo los que tienen coordenadas válidas
        const validPoints = data.filter(item => item.Latitud && item.Longitud);
        
        document.getElementById('counter').innerText = validPoints.length;

        validPoints.forEach(item => {
            const el = document.createElement('div');
            el.className = 'custom-marker';
            
            const icon = document.createElement('div');
            icon.className = 'marker-icon';
            // Si no hay imagen, usamos un logo por defecto
            const imgUrl = item.Imagen_URL || 'logos/japay-logo.png';
            icon.style.backgroundImage = `url(${imgUrl})`;
            
            const label = document.createElement('div');
            label.className = 'marker-label';
            label.innerText = item.Cliente || 'Equipo';

            el.appendChild(icon);
            el.appendChild(label);

            const marker = new mapboxgl.Marker(el)
                .setLngLat([parseFloat(item.Longitud), parseFloat(item.Latitud)])
                .setPopup(new mapboxgl.Popup().setHTML(`
                    <div class="p-2">
                        <strong class="text-orange-600">${item.Cliente}</strong><br>
                        <small>ID: ${item.ID}</small><br>
                        <p class="text-xs mt-1">${item.Marca || ''} - ${item.Zona || ''}</p>
                    </div>
                `))
                .addTo(map);
            
            htmlMarkers.push(marker);
        });

        // Si hay puntos, centrar el mapa en el primero
        if (validPoints.length > 0) {
            map.flyTo({
                center: [parseFloat(validPoints[0].Longitud), parseFloat(validPoints[0].Latitud)],
                zoom: 6
            });
        }
    }

    function populateFilters(data) {
        const zS = document.getElementById('filter-zona');
        const mS = document.getElementById('filter-marca');

        const zonas = [...new Set(data.map(i => i.Zona).filter(Boolean))].sort();
        const marcas = [...new Set(data.map(i => i.Marca).filter(Boolean))].sort();

        zS.innerHTML = '<option value="all">Todas las Zonas</option>';
        zonas.forEach(z => {
            zS.innerHTML += `<option value="${z}">${z}</option>`;
        });

        mS.innerHTML = '<option value="all">Todas las Marcas</option>';
        marcas.forEach(m => {
            mS.innerHTML += `<option value="${m}">${m}</option>`;
        });

        const applyFilters = () => {
            const filtered = allData.filter(i => 
                (zS.value === 'all' || i.Zona === zS.value) &&
                (mS.value === 'all' || i.Marca === mS.value)
            );
            updateMapData(filtered);
        };

        zS.onchange = applyFilters;
        mS.onchange = applyFilters;
    }
</script>
